[build]
dockerfilePath = "apps/worker/Dockerfile"

# No startCommand here — let the Dockerfile CMD run. The CMD does
# `cd apps/worker && tsx src/index.ts` because tsx needs the worker's
# directory as cwd to correctly resolve `./env` against the monorepo's
# hoisted node_modules.

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
